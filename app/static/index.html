<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwitchBot センサーダッシュボード</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/static/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/static/site.webmanifest">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-title" content="センサー">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-border: #334155;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #38bdf8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--panel-border);
  }
  header h1 { font-size: 18px; margin: 0; flex: 1; white-space: nowrap; }
  .range-buttons { display: flex; gap: 6px; }
  .range-buttons button {
    background: var(--panel);
    color: var(--text-dim);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 13px;
  }
  .range-buttons button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f172a;
    font-weight: 600;
  }
  #updated { font-size: 12px; color: var(--text-dim); }
  main { padding: 20px 24px 40px; max-width: 1200px; margin: 0 auto; }
  .cards-hint { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s, border-color 0.15s;
  }
  .card:hover { border-color: var(--text-dim); }
  .card.off { opacity: 0.35; }
  .card.off .name::after { content: " (非表示)"; font-size: 11px; color: var(--text-dim); }
  .card .name {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .card .dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .card .values { display: flex; flex-wrap: wrap; gap: 4px 16px; }
  .card .value { font-size: 22px; font-weight: 700; }
  .card .value small { font-size: 12px; font-weight: 400; color: var(--text-dim); margin-left: 2px; }
  .card .meta { margin-top: 8px; font-size: 11px; color: var(--text-dim); }
  .chart-panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .chart-panel h2 { font-size: 14px; margin: 0 0 10px; color: var(--text-dim); font-weight: 600; }
  .chart-wrap { position: relative; height: 280px; }
  #empty {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    display: none;
  }
  /* スマホ: カードを2列コンパクトにしてファーストビューにグラフを入れる */
  @media (max-width: 640px) {
    header { padding: 10px 16px; gap: 8px; }
    header h1 { font-size: 15px; }
    #updated { display: none; }
    main { padding: 12px 16px 32px; }
    .cards-hint { font-size: 11px; margin-bottom: 6px; }
    .cards { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    .card { padding: 8px 10px; border-radius: 10px; }
    .card .name { font-size: 12px; margin-bottom: 4px; gap: 6px; }
    .card .dot { width: 10px; height: 10px; }
    .card .values { gap: 2px 8px; }
    .card .value { font-size: 16px; }
    .card .value small { font-size: 10px; }
    .card .meta {
      margin-top: 4px;
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chart-panel { padding: 12px; margin-bottom: 14px; }
    .chart-wrap { height: 220px; }
  }
</style>
</head>
<body>
<header>
  <h1>🌡️ SwitchBot センサーダッシュボード</h1>
  <div class="range-buttons" id="ranges"></div>
  <span id="updated"></span>
</header>
<main>
  <div id="empty">まだデータがありません。ロガーがデータを保存するとここに表示されます。</div>
  <div class="cards-hint">カードをクリックするとグラフの表示/非表示を切り替えられます</div>
  <div class="cards" id="cards"></div>
  <div id="charts"></div>
</main>
<script>
const RANGES = [
  { label: "6時間", hours: 6 },
  { label: "24時間", hours: 24 },
  { label: "7日", hours: 24 * 7 },
  { label: "30日", hours: 24 * 30 },
];
const METRIC_DEFS = [
  { key: "temperature", title: "温度 (℃)", unit: "℃" },
  { key: "humidity", title: "湿度 (%)", unit: "%" },
  { key: "co2", title: "CO2濃度 (ppm)", unit: "ppm" },
  { key: "light_level", title: "照度レベル", unit: "" },
  { key: "battery", title: "電池残量 (%)", unit: "%" },
];
// Okabe-Ito カラーユニバーサルパレット(暗背景向けに明るい色を優先)
const PALETTE = ["#56B4E9", "#E69F00", "#F0E442", "#CC79A7", "#009E73", "#FFFFFF", "#D55E00", "#94a3b8"];
// 色だけに頼らないための識別: デバイスごとにマーカー形状を変える
const POINT_STYLES = ["circle", "rect", "triangle", "rectRot", "cross", "star", "circle", "rect"];
const REFRESH_MS = 60000;

let currentHours = 24;
let lastLatest = [];
let lastData = null;
const charts = {};       // metric key -> Chart instance
const deviceIndex = {};  // deviceId -> palette index
let hiddenDevices = new Set(JSON.parse(localStorage.getItem("hiddenDevices") || "[]"));

function idxFor(deviceId) {
  if (!(deviceId in deviceIndex)) {
    deviceIndex[deviceId] = Object.keys(deviceIndex).length;
  }
  return deviceIndex[deviceId];
}
function colorFor(deviceId) { return PALETTE[idxFor(deviceId) % PALETTE.length]; }
function styleFor(deviceId) { return POINT_STYLES[idxFor(deviceId) % POINT_STYLES.length]; }

function toggleDevice(deviceId) {
  if (hiddenDevices.has(deviceId)) hiddenDevices.delete(deviceId);
  else hiddenDevices.add(deviceId);
  localStorage.setItem("hiddenDevices", JSON.stringify([...hiddenDevices]));
  renderCards(lastLatest);
  if (lastData) updateCharts(lastData);
}

function fmtTime(iso) {
  return new Date(iso).toLocaleString("ja-JP", {
    month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit",
  });
}

function renderRangeButtons() {
  const box = document.getElementById("ranges");
  RANGES.forEach(r => {
    const btn = document.createElement("button");
    btn.textContent = r.label;
    btn.className = r.hours === currentHours ? "active" : "";
    btn.onclick = () => {
      currentHours = r.hours;
      box.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      refresh();
    };
    box.appendChild(btn);
  });
}

function renderCards(latest) {
  const box = document.getElementById("cards");
  box.innerHTML = "";
  latest.forEach(d => {
    const card = document.createElement("div");
    card.className = "card" + (hiddenDevices.has(d.deviceId) ? " off" : "");
    card.onclick = () => toggleDevice(d.deviceId);
    const vals = [];
    if (d.temperature != null) vals.push(`<span class="value">${d.temperature}<small>℃</small></span>`);
    if (d.humidity != null) vals.push(`<span class="value">${d.humidity}<small>%</small></span>`);
    if (d.co2 != null) vals.push(`<span class="value">${d.co2}<small>ppm</small></span>`);
    const meta = [];
    if (d.battery != null) meta.push(`🔋${d.battery}%`);
    meta.push(fmtTime(d.recordedAt));
    card.innerHTML = `
      <div class="name"><span class="dot" style="background:${colorFor(d.deviceId)}"></span>${d.deviceName}</div>
      <div class="values">${vals.join("")}</div>
      <div class="meta">${d.deviceType} ・ ${meta.join(" ・ ")}</div>`;
    box.appendChild(card);
  });
}

function ensureChart(metric) {
  if (charts[metric.key]) return charts[metric.key];
  const panel = document.createElement("div");
  panel.className = "chart-panel";
  panel.id = `panel-${metric.key}`;
  panel.innerHTML = `<h2>${metric.title}</h2><div class="chart-wrap"><canvas id="chart-${metric.key}"></canvas></div>`;
  document.getElementById("charts").appendChild(panel);
  const ctx = document.getElementById(`chart-${metric.key}`).getContext("2d");
  charts[metric.key] = new Chart(ctx, {
    type: "line",
    data: { datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: "nearest", axis: "x", intersect: false },
      plugins: {
        legend: {
          labels: {
            color: "#e2e8f0",
            usePointStyle: true,
            boxHeight: 9,
            boxWidth: 18,
            font: { size: 13 },
          },
        },
        tooltip: {
          callbacks: {
            label: c => `${c.dataset.label}: ${c.parsed.y}${metric.unit}`,
          },
        },
      },
      scales: {
        x: {
          type: "time",
          time: {
            tooltipFormat: "MM/dd HH:mm",
            displayFormats: { hour: "HH:mm", day: "MM/dd", minute: "HH:mm" },
          },
          ticks: { color: "#cbd5e1", maxTicksLimit: 10, font: { size: 12 } },
          grid: { color: "#334155" },
        },
        y: {
          ticks: { color: "#cbd5e1", font: { size: 12 } },
          grid: { color: "#334155" },
        },
      },
    },
  });
  return charts[metric.key];
}

function updateCharts(data) {
  const series = data.series.filter(s => !hiddenDevices.has(s.deviceId));
  METRIC_DEFS.forEach(metric => {
    const hasData = series.some(s => s.points.some(p => p[metric.key] != null));
    const existingPanel = document.getElementById(`panel-${metric.key}`);
    if (!hasData) {
      if (existingPanel) existingPanel.style.display = "none";
      return;
    }
    const chart = ensureChart(metric);
    document.getElementById(`panel-${metric.key}`).style.display = "";
    chart.data.datasets = series
      .filter(s => s.points.some(p => p[metric.key] != null))
      .map(s => {
        const pts = s.points
          .filter(p => p[metric.key] != null)
          .map(p => ({ x: p.t, y: p[metric.key] }));
        return {
          label: s.deviceName,
          data: pts,
          borderColor: colorFor(s.deviceId),
          backgroundColor: colorFor(s.deviceId),
          borderWidth: 2,
          // 外気(Open-Meteo)は破線で室内センサーと区別する
          borderDash: s.deviceType === "OpenMeteo" ? [8, 5] : [],
          pointStyle: styleFor(s.deviceId),
          // データが少ないうちは線が描けないので点を見せる
          pointRadius: pts.length < 20 ? 4 : 0,
          pointHitRadius: 8,
          tension: 0.25,
        };
      });
    chart.update();
  });
}

async function refresh() {
  try {
    const [latest, data] = await Promise.all([
      fetch("/api/latest").then(r => r.json()),
      fetch(`/api/measurements?hours=${currentHours}`).then(r => r.json()),
    ]);
    lastLatest = latest;
    lastData = data;
    document.getElementById("empty").style.display = latest.length ? "none" : "block";
    // 色とマーカーの割り当てをカード表示順(名前順)で固定する
    latest.forEach(d => idxFor(d.deviceId));
    renderCards(latest);
    updateCharts(data);
    document.getElementById("updated").textContent =
      `更新: ${new Date().toLocaleTimeString("ja-JP")}`;
  } catch (e) {
    console.error("refresh failed", e);
    document.getElementById("updated").textContent = "更新エラー";
  }
}

renderRangeButtons();
refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
