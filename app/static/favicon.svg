<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.25" cy="0.15" r="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- squircle background -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#shine)"/>

  <!-- rising sparkline -->
  <polyline points="262,344 322,272 366,306 436,196" fill="none"
            stroke="#ffffff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="436" cy="196" r="27" fill="#ffffff"/>

  <!-- thermometer -->
  <rect x="146" y="100" width="60" height="240" rx="30" fill="#ffffff"/>
  <circle cx="176" cy="368" r="56" fill="#ffffff"/>
  <circle cx="176" cy="368" r="34" fill="#312e81"/>
  <rect x="164" y="210" width="24" height="150" rx="12" fill="#312e81"/>
</svg>
